name: Release

on:
  push:
    branches:
      - KuGou
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}
          fetch-depth: 0

      - name: Checkout KuGouMusicApi
        uses: actions/checkout@v4
        with:
          repository: Arihara-Satoru/KuGouMusicApi
          ref: main
          path: KuGouMusicApi
          token: ${{ github.token }}
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install KuGouMusicApi dependencies
        working-directory: KuGouMusicApi
        run: npm install --no-audit --no-fund --legacy-peer-deps

      - name: Build KuGouMusicApi JS bundle
        run: node scripts/build-kugou-api.cjs

      - name: Setup MSVC build tools
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build application
        run: pnpm run dist
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GH_TOKEN: ${{ github.token }}

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v${VERSION}"
          echo "Creating release for ${TAG}"
          gh release create "${TAG}" \
            --title "${TAG}" \
            --generate-notes \
            release/*.exe release/*.zip release/*.blockmap release/latest.yml || \
            echo "Release ${TAG} already exists or creation failed"
