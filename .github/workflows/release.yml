name: Release

on:
  push:
    branches:
      - KuGou
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}
          fetch-depth: 0

      - name: Checkout KuGouMusicApi
        uses: actions/checkout@v4
        with:
          repository: MakcRe/KuGouMusicApi
          path: KuGouMusicApi
          token: ${{ github.token }}
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install KuGouMusicApi dependencies
        working-directory: KuGouMusicApi
        run: npm install --no-audit --no-fund

      - name: Build KuGouMusicApi JS bundle
        run: node scripts/build-kugou-api.cjs

      - name: Setup MSVC build tools
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Create GitHub Release
        run: npm run release
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GH_TOKEN: ${{ github.token }}