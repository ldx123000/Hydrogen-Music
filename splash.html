<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; img-src 'self'; style-src 'unsafe-inline'; script-src 'unsafe-inline'"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hydrogen Music</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, "Segoe UI", "Microsoft YaHei", "PingFang SC", sans-serif;
        background: #f7f9fc;
        color: #182232;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 50% 0%, rgba(96, 165, 250, 0.18), transparent 34%),
          linear-gradient(180deg, #ffffff 0%, #f4f7fb 100%);
        overflow: hidden;
        user-select: none;
      }

      main {
        width: 100%;
        height: 100vh;
        display: grid;
        place-items: center;
        padding: 28px;
      }

      .content {
        display: grid;
        justify-items: center;
        gap: 14px;
      }

      .logo {
        width: 64px;
        height: 64px;
        border-radius: 18px;
        box-shadow: 0 12px 30px rgba(40, 90, 160, 0.18);
      }

      h1 {
        margin: 4px 0 0;
        font-size: 21px;
        font-weight: 700;
        letter-spacing: 0;
      }

      .wave {
        height: 28px;
        display: flex;
        align-items: center;
        gap: 5px;
      }

      .wave span {
        width: 5px;
        height: 10px;
        border-radius: 999px;
        background: linear-gradient(180deg, #47a3ff, #2f6df6);
        animation: pulse 900ms ease-in-out infinite;
      }

      .wave span:nth-child(2) {
        animation-delay: 90ms;
      }

      .wave span:nth-child(3) {
        animation-delay: 180ms;
      }

      .wave span:nth-child(4) {
        animation-delay: 270ms;
      }

      .wave span:nth-child(5) {
        animation-delay: 360ms;
      }

      .status {
        min-height: 20px;
        margin: 0;
        color: #607086;
        font-size: 13px;
      }

      @keyframes pulse {
        0%,
        100% {
          height: 10px;
          opacity: 0.55;
        }

        50% {
          height: 26px;
          opacity: 1;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .wave span {
          animation: none;
          height: 16px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="content" aria-label="Hydrogen Music 正在启动">
        <img class="logo" src="./src/assets/icon/icon.png" alt="" />
        <h1>Hydrogen Music</h1>
        <div class="wave" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
          <span></span>
          <span></span>
        </div>
        <p id="status" class="status">正在启动音乐服务...</p>
      </section>
    </main>
    <script>
      window.setSplashStatus = (status) => {
        document.getElementById("status").textContent = status;
      };
    </script>
  </body>
</html>
